<div class="flex flex-col h-full">

    <div class="p-2 md:px-4 xl:px-8 flex flex-col w-full justify-center items-center">

        <div class="w-3/4">
            <div class="w-full flex flex-row items-center p-2 px-4 text-primary">
                <div class="text-lg pr-1">
                    Chats
                </div>
                <div class="text-xs flex-1">
                    {{'(' + chats().length + ')'}}
                </div>
                <div class="justify-end">
                    <twang-button icon="Plus" label="New Chat" (btnClick)="onCreateChatSelected()"
                        size="sm"></twang-button>
                </div>
            </div>
            <twang-input type="search" />
        </div>

    </div>

    <div class="bg-white p-2 lg:px-4 xl:px-8 md:py-8 md:mb-20 flex-1 overflow-y-auto">

        @for (chat of chats(); track chat.id) {
        <div class="pb-2">
            <div class="p-4 gap-8 border bg-gray-50 border rounded-lg transition-all duration-200
        border-slate-300 text-slate-900 placeholder:text-slate-400
        hover:border-slate-400 hover:bg-gray-100
        focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500
        disabled:bg-slate-50 disabled:text-slate-400 disabled:cursor-not-allowed
        invalid:border-red-500 invalid:text-red-600" (click)="onChatSelected(chat)">

                <div class="w-full flex flex-row gap-8 items-center">
                    <div class="text-lg text-primary">
                        {{chat.title   + ' (Streaming - ' + chat.stream + ')'}}
                    </div>
                    <div>
                        {{chat.llm + ' / ' + chat.model}}
                    </div>
                </div>
                <div class="px-16 pt-2 line-clamp-3 text-sm text-slate-600">
                    <markdown [data]="chat.system"></markdown>
                </div>

            </div>
        </div>
        }
    </div>

</div>
