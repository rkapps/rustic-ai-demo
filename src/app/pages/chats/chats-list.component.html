<div class="flex h-full overflow-hidden gap-12 p-3">

    <!-- Left column: chat list -->
    <div class="w-72 flex-none flex flex-col bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">

        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200">
            <span class="text-sm font-semibold text-primary-600">Chats ({{ chats().length }})</span>
            <div class="flex items-center gap-1">
                <twang-button icon="add" variant="default" size="sm" ariaLabel="New chat" (buttonClick)="onCreateChatSelected()"></twang-button>
                <twang-button icon="refresh" variant="default" size="sm" ariaLabel="Refresh chats" (buttonClick)="onRefresh()"></twang-button>
            </div>
        </div>

        <div class="px-3 py-2 border-b border-gray-200">
            <input type="search" placeholder="Search chats..."
                class="w-full rounded-lg border border-gray-200 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/30 focus:border-primary-500"
                [value]="appState.searchChatQuery()"
                (input)="appState.updateSearchChatQuery($any($event.target).value)" />
        </div>

        <div class="flex-1 overflow-y-auto">
            @for (chat of chats(); track chat.id) {
            <div (click)="onChatSelected(chat)"
                class="px-4 py-4 cursor-pointer transition-all duration-150 border-b border-gray-200"
                [class]="selectedChatId() === chat.id
                    ? 'bg-blue-50 text-blue-900'
                    : 'hover:bg-gray-50'">
                <div class="font-medium text-sm truncate">{{ chat.title }}</div>
                <div class="text-xs text-gray-400 mt-0.5 truncate">{{ chat.llm }} / {{ chat.model }}</div>
            </div>
            }
        </div>

    </div>

    <!-- Right column -->
    <div class="flex-1 flex flex-col overflow-hidden">

        @if (selectedChat(); as chat) {
            <div class="flex-none pb-3 flex items-center justify-center relative">
                <div class="text-lg font-semibold text-primary-600">{{ chat.title }}</div>
                <twang-button icon="delete" variant="default" size="sm" ariaLabel="Delete chat"
                    class="absolute right-0"
                    (buttonClick)="onDeleteChat(chat)">
                </twang-button>
            </div>
        } @else {
            <div class="flex-1 flex items-center justify-center text-gray-400 text-sm">
                Select a chat to start
            </div>
        }

        <!-- Outlet always in DOM so the router can render into it -->
        <div class="flex-1 bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden"
            [class.hidden]="!selectedChat()">
            <router-outlet />
        </div>

    </div>

</div>
