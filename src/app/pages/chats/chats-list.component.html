<div class="flex h-full overflow-hidden gap-3 p-3">

    <!-- Left column: chat list -->
    <div class="w-72 flex-none flex flex-col bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">

        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200">
            <span class="text-sm font-semibold text-gray-700">Chats ({{ chats().length }})</span>
            <twang-button icon="Plus" label="New" size="sm" (btnClick)="onCreateChatSelected()"></twang-button>
        </div>

        <div class="px-3 py-2 border-b border-gray-200">
            <twang-input type="search" placeholder="Search chats..." />
        </div>

        <div class="flex-1 overflow-y-auto">
            @for (chat of chats(); track chat.id) {
            <div class="px-3 py-2">
                <div (click)="onChatSelected(chat)"
                    class="p-3 rounded-lg cursor-pointer transition-all duration-150 border"
                    [class]="selectedChatId() === chat.id
                        ? 'bg-blue-50 border-blue-300 text-blue-900'
                        : 'bg-white border-gray-200 hover:bg-gray-100 hover:border-gray-300'">
                    <div class="font-medium text-sm truncate">{{ chat.title }}</div>
                    <div class="text-xs text-gray-400 mt-0.5 truncate">{{ chat.llm }} / {{ chat.model }}</div>
                </div>
            </div>
            }
        </div>

    </div>

    <!-- Right column: chat detail -->
    <div class="flex-1 bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
        @if (selectedChatId()) {
            <app-chat-detail [id]="selectedChatId()" />
        } @else {
            <div class="h-full flex items-center justify-center text-gray-400 text-sm">
                Select a chat to start
            </div>
        }
    </div>

</div>
