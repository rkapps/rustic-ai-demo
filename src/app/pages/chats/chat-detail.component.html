<div class="h-full flex flex-col">

    <!-- Messages -->
    <div class="flex-1 min-h-0 overflow-y-auto px-6 py-4" #scrollContainer>
        <twang-chat-messages
            class="block"
            [messages]="messages()"
            [autoScroll]="false"
            [showMarkdown]="true">
        </twang-chat-messages>
    </div>

    <!-- Input -->
    <div class="flex-none py-4 border-t border-gray-200 flex justify-center">
        <form (submit)="$event.preventDefault(); submitPrompt()" class="w-3/4">
            <div class="flex items-end gap-3">
                <twang-textarea class="flex-1" variant="secondary" label=""
                    [(value)]="chatRequestForm.prompt" [rows]="2" (enter)="handleEnter($event)"
                    placeholder="Enter your prompt...">
                </twang-textarea>
                <twang-button type="submit" icon="ArrowUp"
                    [disabled]="!chatRequestForm.prompt().trim() || isLoading()" [isLoading]="isLoading()">
                </twang-button>
            </div>
        </form>
    </div>

</div>
