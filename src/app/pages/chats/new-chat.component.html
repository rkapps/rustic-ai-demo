<div class="flex flex-col h-full">

    <div class="p-2 md:px-4 xl:px-8">
        <div class="text-2xl text-primary-600">Configure a new Chat</div>
    </div>

    <div class="bg-white p-2 lg:px-4 xl:px-8 md:py-8 flex-1 overflow-y-auto">
        <form (submit)="$event.preventDefault(); submit()">

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                <input class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/30 focus:border-primary-500"
                    placeholder="Enter the title"
                    [value]="chatForm.title()"
                    (input)="chatForm.title.set($any($event.target).value)" />
            </div>

            <div class="w-full flex flex-row gap-16 pt-4">

                <div class="w-1/3 flex flex-col gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">LLM</label>
                        <twang-dropdown [options]="llmNodes()" [value]="selectedLlmValue()"
                            placeholder="Select LLM..." (valueChange)="onLlmProviderSelected($event)">
                        </twang-dropdown>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Model</label>
                        <twang-dropdown [options]="modelNodes()" [value]="selectedModelValue()"
                            placeholder="Select model..." (valueChange)="onLlmModelSelected($event)">
                        </twang-dropdown>
                    </div>
                    <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-700">
                        <input type="checkbox"
                            [checked]="chatForm.stream()"
                            (change)="chatForm.stream.set($any($event.target).checked)"
                            class="size-4 accent-primary-600" />
                        Stream
                    </label>
                </div>

                <div class="w-2/3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">System Prompt</label>
                    <textarea class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-primary-500/30 focus:border-primary-500"
                        rows="15"
                        placeholder="Enter the system prompt or instructions..."
                        [value]="chatForm.system()"
                        (input)="chatForm.system.set($any($event.target).value)">
                    </textarea>
                </div>
            </div>

            <div class="py-4 flex justify-center">
                <div class="w-3/4 flex justify-end">
                    <twang-button type="submit" label="Create Chat" [disabled]="!isValid()"></twang-button>
                </div>
            </div>

        </form>
    </div>

</div>
