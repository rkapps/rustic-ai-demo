<div class="animate-in fade-in duration-700">
    <!-- 1. Header Section -->
    <div class="flex justify-between items-end mb-8">
        <div>
            <h1 class="text-3xl font-bold text-gray-900 tracking-tight">System Overview</h1>
            <p class="text-gray-500 mt-1">Welcome back! Here is what's happening today.</p>
        </div>
        <button
            class="px-4 py-2 bg-white border border-gray-200 rounded-lg shadow-sm text-sm font-semibold hover:bg-gray-50 transition">
            Download Report
        </button>
    </div>

    <!-- 2. Metric Cards (The "Big Three") -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <!-- Card 1 -->
        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-center justify-between mb-4">
                <div class="p-2 bg-blue-50 rounded-lg text-blue-600">
                    <svg class="size-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-width="2"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                </div>
                <span class="text-green-500 text-xs font-bold bg-green-50 px-2 py-1 rounded-full">+12.5%</span>
            </div>
            <p class="text-sm font-medium text-gray-500">Active Users</p>
            <h3 class="text-3xl font-bold text-gray-900 mt-1">8,432</h3>
        </div>

        <!-- Card 2 -->
        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
            <div class="flex items-center justify-between mb-4">
                <div class="p-2 bg-purple-50 rounded-lg text-purple-600">
                    <svg class="size-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-width="2"
                            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                    </svg>
                </div>
                <span class="text-gray-400 text-xs font-medium">Last 24h</span>
            </div>
            <p class="text-sm font-medium text-gray-500">New Messages</p>
            <h3 class="text-3xl font-bold text-gray-900 mt-1">142</h3>
        </div>

        <!-- Card 3 -->
        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
            <div class="flex items-center justify-between mb-4">
                <div class="p-2 bg-orange-50 rounded-lg text-orange-600">
                    <svg class="size-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <span class="text-red-500 text-xs font-bold bg-red-50 px-2 py-1 rounded-full">-2.1%</span>
            </div>
            <p class="text-sm font-medium text-gray-500">Server Load</p>
            <h3 class="text-3xl font-bold text-gray-900 mt-1">42%</h3>
        </div>
    </div>

    <!-- 3. Lower Section: Activity & Actions -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
            <div class="p-6 border-b border-gray-50 flex justify-between items-center">
                <h4 class="font-bold text-gray-900">Recent Activity</h4>
                <a routerLink="/chats" class="text-sm text-blue-600 font-semibold hover:underline">View All</a>
            </div>
            <div class="divide-y divide-gray-50">
                @for (item of [1,2,3,4]; track item) {
                <div class="p-4 flex items-center gap-4 hover:bg-gray-50 transition cursor-pointer">
                    <div class="size-10 rounded-full bg-gray-100 flex-shrink-0 border border-white"></div>
                    <div class="flex-1">
                        <p class="text-sm font-semibold text-gray-900">John Doe sent a message</p>
                        <p class="text-xs text-gray-500">2 minutes ago</p>
                    </div>
                    <div class="size-2 rounded-full bg-blue-500"></div>
                </div>
                }
            </div>
        </div>

        <!-- Quick Action Grid -->
        <div class="grid grid-cols-2 gap-4">
            <button
                class="bg-blue-600 text-white p-6 rounded-2xl flex flex-col items-center justify-center gap-3 hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                <svg class="size-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                <span class="font-bold">New Chat</span>
            </button>
            <button
                class="bg-white border border-gray-100 p-6 rounded-2xl flex flex-col items-center justify-center gap-3 hover:bg-gray-50 transition">
                <svg class="size-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                </svg>
                <span class="font-bold text-gray-700">Settings</span>
            </button>
        </div>
    </div>
</div>
