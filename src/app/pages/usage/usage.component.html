<div class="flex flex-col md:flex-row h-full overflow-hidden gap-2 md:gap-6">

    <!-- Desktop: collapsed panel toggle -->
    @if (!panelOpen()) {
        <div class="hidden md:flex self-start mt-0.5">
            <twang-button icon="menu" variant="default" size="sm" ariaLabel="Open filters" (buttonClick)="panelOpen.set(true)"></twang-button>
        </div>
    }

    <!-- Left: filters -->
    <div [class]="(panelOpen() ? (showTable() ? 'hidden md:flex' : 'flex') : 'hidden') + ' flex-1 md:flex-none flex-col bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden w-full md:w-72'">

        <div class="flex-none px-4 py-3 border-b border-gray-200 flex items-center">
            <span class="flex-1 text-sm font-semibold text-primary-600">Filters</span>
            <div class="hidden md:flex">
                <twang-button icon="chevron-left" variant="default" size="sm" ariaLabel="Collapse panel"
                    (buttonClick)="panelOpen.set(false)">
                </twang-button>
            </div>
        </div>

        <div class="flex-1 flex flex-col gap-4 p-4 overflow-y-auto">

            <div>
                <label class="block text-xs font-medium text-gray-500 mb-2">Type</label>
                <div class="flex flex-col gap-1.5">
                    @for (opt of ['all', 'chat', 'agent']; track opt) {
                        <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
                            <input type="radio" name="convType" [value]="opt"
                                [checked]="convType() === opt"
                                (change)="convType.set($any(opt))"
                                class="accent-primary-600" />
                            {{ opt === 'all' ? 'All' : opt === 'chat' ? 'Chat' : 'Agent' }}
                        </label>
                    }
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-500 mb-2">LLM</label>
                <div class="flex flex-col gap-1.5">
                    @for (opt of ['all', 'openai', 'gemini', 'anthropic', 'local']; track opt) {
                        <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
                            <input type="radio" name="llm" [value]="opt"
                                [checked]="llm() === opt"
                                (change)="llm.set($any(opt))"
                                class="accent-primary-600" />
                            {{ opt === 'all' ? 'All' : opt === 'openai' ? 'OpenAI' : opt === 'gemini' ? 'Gemini' : opt === 'anthropic' ? 'Anthropic' : 'Local' }}
                        </label>
                    }
                </div>
            </div>

            <div>
                <twang-datepicker label="From" placeholder="Start date"
                    [value]="startDate()"
                    (valueChange)="startDate.set($event)">
                </twang-datepicker>
            </div>

            <div>
                <twang-datepicker label="To" placeholder="End date"
                    [value]="endDate()"
                    (valueChange)="endDate.set($event)">
                </twang-datepicker>
            </div>

        </div>

        <!-- Mobile: apply button -->
        <div class="md:hidden flex-none px-4 py-3 border-t border-gray-200">
            <button type="button"
                class="w-full rounded-lg bg-primary-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-primary-700 active:scale-95 transition-all"
                (click)="showTable.set(true)">
                Apply
            </button>
        </div>

    </div>

    <!-- Right: usage table -->
    <div [class]="(showTable() ? 'flex' : 'hidden md:flex') + ' flex-1 flex-col bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden min-w-0 min-h-0'">
        <div class="flex-none px-4 md:px-6 py-3 border-b border-gray-200 flex items-center gap-2">
            <span class="flex-1 text-sm font-semibold text-primary-600">Token Usage</span>
            <twang-button icon="refresh-cw" variant="default" size="sm" ariaLabel="Refresh" [loading]="usageTable?.loading() ?? false" (buttonClick)="usageTable?.load()"></twang-button>
            <div class="md:hidden flex">
                <twang-button icon="chevron-left" variant="default" size="sm" ariaLabel="Show filters" (buttonClick)="showTable.set(false)"></twang-button>
            </div>
        </div>
        <app-usage-table #usageTable
            [filterType]="convType()"
            [filterLlm]="llm()"
            [filterStartDate]="startDate()"
            [filterEndDate]="endDate()">
        </app-usage-table>
    </div>

</div>
