<div class="twang-dropdown-root relative w-full">
  <button
    type="button"
    [class]="triggerClasses()"
    [attr.id]="fieldId() ?? null"
    [disabled]="disabled()"
    [attr.aria-expanded]="open()"
    aria-haspopup="listbox"
    (click)="toggleOpen(); $event.stopPropagation()"
  >
    <span class="min-w-0 flex-1 truncate" [class.text-text-muted]="!value()">{{ currentLabel() }}</span>
    <span class="twang-dropdown-chevron" aria-hidden="true">
      <span [class]="chevronClass()" [class.rotate-180]="open()">expand_more</span>
    </span>
  </button>

  @if (open()) {
    <div
      class="twang-dropdown-panel absolute left-0 right-0 z-50 mt-1 max-h-64 overflow-auto rounded-lg border border-border bg-white py-1 shadow-lg ring-1 ring-black/5"
      role="listbox"
      (mousedown)="$event.stopPropagation()"
    >
      @for (opt of options(); track opt.value) {
        <button
          type="button"
          role="option"
          class="flex w-full items-center px-3 py-1 text-left text-sm text-text hover:bg-primary-50/80 hover:text-primary-800"
          [class.bg-primary-50]="opt.value === value()"
          [attr.aria-selected]="opt.value === value()"
          (click)="select(opt, $event)"
        >
          {{ opt.label }}
        </button>
      } @empty {
        <div class="px-3 py-2 text-sm text-text-muted">No options</div>
      }
    </div>
  }
</div>
