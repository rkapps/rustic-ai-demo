<div class="h-full flex flex-col">

    <!-- Messages -->
    <div class="flex-1 min-h-0 overflow-y-auto px-3 py-2 md:px-6 md:py-4" #scrollContainer>

        @if (chat().system_prompt) {
            <div class="flex justify-center mb-4">
                <div class="max-w-[75%] text-center text-sm text-primary-600 bg-white border border-gray-100 rounded-xl px-4 py-2.5 italic">
                    {{ chat().system_prompt }}
                </div>
            </div>
        }

        @for (msg of messages(); track msg.id) {
            <div class="mb-4" [class]="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
                <div class="rounded-xl px-3 py-2 md:px-4 md:py-2.5 text-sm"
                    [class]="msg.role === 'user'
                        ? 'max-w-[90%] md:max-w-[75%] bg-gray-50 text-black'
                        : 'w-full bg-white text-gray-900'">
                    <markdown [data]="msg.content" class="prose prose-sm max-w-none">
                    </markdown>
                </div>

            </div>
        }
    </div>

    <!-- Input -->
    <div class="flex-none pt-2 pb-8 md:pt-4 md:pb-12 border-t border-gray-200 flex justify-center">
        <div class="mx-auto flex w-full max-w-full md:max-w-[75%] min-w-0 flex-col gap-2 px-3 md:px-0">
            <div class="flex w-full min-w-0 flex-wrap items-center gap-3">
                <textarea
                    class="min-h-[5.5rem] min-w-0 flex-1 resize-y rounded-3xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-900 shadow-sm ring-1 ring-black/[0.03] outline-none transition placeholder:text-gray-400 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/25 disabled:cursor-not-allowed disabled:opacity-60"
                    rows="3"
                    placeholder="Enter your prompt..."
                    [value]="chatRequestForm.prompt()"
                    [disabled]="isLoading()"
                    (input)="chatRequestForm.prompt.set($any($event.target).value)"
                    (keydown.enter)="handleEnter($event)"
                    aria-label="Message">
                </textarea>
                <button
                    type="button"
                    class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-2xl bg-primary-600 text-white shadow-sm transition hover:bg-primary-700 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary-600 disabled:cursor-not-allowed disabled:opacity-50"
                    [disabled]="isLoading() || !chatRequestForm.prompt().trim()"
                    (click)="submitPrompt()"
                    aria-label="Send message">
                    <lucide-icon name="send" [size]="16"></lucide-icon>
                </button>
                @if (speechSupported) {
                <button
                    type="button"
                    class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-2xl border shadow-sm ring-1 ring-black/[0.03] transition focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary-500 disabled:cursor-not-allowed disabled:opacity-50"
                    [class]="listening()
                        ? 'border-primary-500 bg-primary-50 text-primary-700'
                        : 'border-gray-200 bg-white text-gray-400 hover:bg-gray-50 hover:text-gray-600'"
                    [disabled]="isLoading()"
                    [attr.aria-label]="listening() ? 'Stop voice input' : 'Start voice input'"
                    (click)="onMicrophoneClick()">
                    @if (listening()) {
                        <lucide-icon name="mic-off" [size]="16"></lucide-icon>
                    } @else {
                        <lucide-icon name="mic" [size]="16"></lucide-icon>
                    }
                </button>
                }
            </div>
        </div>
    </div>

</div>
